name: Pre-Pump Scanner

on:
  schedule:
    - cron: '0 */2 * * *'   # Setiap 2 jam sekali
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instal numpy dulu karena pandas-ta membutuhkannya saat build
          pip install numpy==1.26.4
          pip install pandas==2.2.3
          pip install requests==2.31.0
          pip install python-dotenv==1.0.1
          # Gunakan versi PyPI yang lebih stabil daripada link zip GitHub
          pip install pandas-ta==0.3.14b0

      - name: Run scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Save state files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan file-file state jika ada
          for file in cooldown.json funding.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          # Commit hanya jika ada perubahan dan file yang di-add
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan pada state files, skip commit."
          else
            git commit -m "chore: update scanner state [skip ci]"
            git push
          fi
