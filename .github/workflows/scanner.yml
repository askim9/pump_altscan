name: NEXUS-PB Scanner

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update outcomes
        run: python nexus_outcome_analyzer.py --hours 48 || true
        env:
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}

      - name: Run NEXUS-PB scanner
        run: python scanner.py
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}

      - name: Track pump events
        run: python nexus_pump_tracker.py || true

      - name: Commit DB
        run: |
          git config user.name  "NEXUS-PB"
          git config user.email "nexus@scanner.bot"
          git add -f nexus_pb_history.db
          git diff --staged --quiet || git commit -m "DB $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push
