name: Pre-Pump Scanner

on:
  schedule:
    - cron: '0 */2 * * *'   # Setiap 2 jam sekali
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pasang paket dasar tanpa kunci versi yang terlalu ketat agar tidak konflik
          pip install numpy pandas requests python-dotenv
          # Pasang pandas-ta langsung dari PyPI (cara paling standar)
          pip install pandas-ta

      - name: Run scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Save state files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Cek jika file state ada, lalu tambahkan
          for file in cooldown.json funding.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          # Commit & Push jika ada perubahan
          if ! git diff --cached --quiet; then
            git commit -m "chore: update scanner state [skip ci]"
            git push
          fi
