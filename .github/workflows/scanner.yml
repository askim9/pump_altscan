name: Pre-Pump Scanner

on:
  schedule:
    - cron: '0 */2 * * *'   # setiap 2 jam sekali
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # gunakan 3.12 agar kompatibel dengan pandas-ta versi terbaru

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pasang paket dasar
          pip install numpy pandas requests python-dotenv
          # Gunakan flag --pre karena pandas-ta 0.4.x masih berstatus pre-release (beta)
          pip install pandas-ta --pre

      - name: Run scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Save state files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          for file in cooldown.json funding.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update scanner state [skip ci]"
            git push
          fi
