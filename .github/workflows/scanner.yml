name: Pre-Pump Scanner

on:
  schedule:
    - cron: '0 */2 * * *'   # setiap 2 jam sekali
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

      - name: Save state files
        if: always()
        run: |
          git config user.name "scanner-bot"
          git config user.email "scanner-bot@noreply"
          
          # Tambahkan file-file state jika ada
          for file in cooldown.json funding.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          # Commit hanya jika ada perubahan
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan pada state files, skip commit."
          else
            git commit -m "chore: update scanner state [skip ci]"
            git push
          fi
